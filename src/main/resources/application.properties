spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout: 30000
spring.datasource.hikari.idle-timeout: 600000
spring.datasource.hikari.max-lifetime: 1800000
spring.datasource.hikari.leak-detection-threshold: 20000

spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:3001
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

logging.level.com.tracksys=DEBUG
logging.level.org.hibernate.SQL=DEBUG


spring.servlet.multipart.max-file-size=30MB

spring.servlet.multipart.max-request-size=30MB

server.tomcat.max-swallow-size=30MB

azure.vision.endpoint=${AZURE_VISION_ENDPOINT}
azure.vision.key=${AZURE_VISION_KEY}
azure.openai.endpoint=${AZURE_OPENAI_ENDPOINT}
azure.openai.key=${AZURE_OPENAI_KEY}
azure.openai.deployment=${AZURE_OPENAI_DEPLOYMENT}


